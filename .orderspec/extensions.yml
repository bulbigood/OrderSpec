installed:
- agent-context
settings:
  auto_execute_hooks: true
hooks:
  after_spec:
  - extension: agent-context
    command: order.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute order.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: order.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute order.agent-context.update?
    description: Refresh agent context after planning
    condition: null
