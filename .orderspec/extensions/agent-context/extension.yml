schema_version: "1.0"

extension:
  id: agent-context
  name: "Coding Agent Context"
  version: "1.0.0"
  description: "Manages coding agent context/instruction files (e.g., CLAUDE.md, copilot-instructions.md) with project-specific plan references and configurable markers"
  author: orderspec-core
  repository: https://github.com/github/orderspec
  license: MIT

requires:
  order_version: ">=0.2.0"

provides:
  commands:
    - name: order.agent-context.update
      file: commands/order.agent-context.update.md
      description: "Refresh the managed OrderSpec section in the coding agent context file"

hooks:
  after_spec:
    command: order.agent-context.update
    optional: true
    description: "Refresh agent context after specification"
  after_plan:
    command: order.agent-context.update
    optional: true
    description: "Refresh agent context after planning"

tags:
  - "agent"
  - "context"
  - "core"
