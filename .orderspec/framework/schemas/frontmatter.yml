artifact_types:
  - framework_rules
  - command_prompt
  - schema
  - protocol
  - spec
  - plan
  - tasks
  - project_contract
  - governance
  - framework_config
  - tooling_config
  - runtime_state
  - gate_report

# ── command_prompt ────────────────────────────────────────────────────────────

command_prompt_required_fields:
  - orderspec.artifact
  - orderspec.command
  - orderspec.phase
  - description

command_prompt_optional_fields:
  - handoffs

command_prompt_field_constraints:
  orderspec.artifact:
    const: command_prompt
  orderspec.command:
    pattern: '^order\.[a-z]+(-[a-z]+)*$'
    example: order.spec
  orderspec.phase:
    enum:
      - bootstrap
      - state
      - specify
      - plan
      - tasks
      - implement
      - check

command_prompt_handoffs_item_required_fields:
  - label
  - agent
  - prompt

command_prompt_handoffs_item_optional_fields:
  - send

# ── spec ──────────────────────────────────────────────────────────────────────

spec_required_fields:
  - orderspec.artifact
  - orderspec.feature_id
  - orderspec.slug
  - orderspec.status
  - orderspec.refs
  - orderspec.refs.framework_rules
  - orderspec.refs.constitution
  - orderspec.refs.stack
  - orderspec.refs.architecture
  - orderspec.refs.conventions
  - orderspec.generator
  - orderspec.generator.command
  - orderspec.generator.model

spec_field_constraints:
  orderspec.artifact:
    const: spec
  orderspec.feature_id:
    pattern: '^FEAT-[0-9]{3}-[a-z0-9]+(-[a-z0-9]+)*$'
    example: FEAT-001-user-auth
  orderspec.slug:
    pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
    example: user-auth
  orderspec.status:
    enum:
      - draft
      - review
      - approved

# ── gate_report ───────────────────────────────────────────────────────────────

gate_report_required_fields:
  - orderspec.artifact
  - orderspec.command
  - orderspec.model
  - orderspec.generated_at
  - orderspec.verdict
  - orderspec.feature_id
  - orderspec.feature_directory

gate_report_field_constraints:
  orderspec.artifact:
    const: gate_report
  orderspec.verdict:
    enum:
      - "PASS"
      - "BLOCK"
      - "ROUTING_REQUIRED"

# ── project_contract ──────────────────────────────────────────────────────────

project_contract_required_fields:
  - orderspec.artifact
  - orderspec.kind
  - orderspec.scope
  - orderspec.owner_command
  - orderspec.id_prefix

project_contract_field_constraints:
  orderspec.artifact:
    const: project_contract
  orderspec.kind:
    enum:
      - constitution
      - stack
      - architecture
      - conventions
  orderspec.scope:
    const: project
  orderspec.owner_command:
    const: order.bootstrap

project_contract_id_prefixes:
  constitution: GOV
  stack: STACK
  architecture: ARCH
  conventions: CONV

project_contract_id_prefix_required_for:
  - constitution
  - stack
  - architecture
  - conventions

# ── framework_rules ───────────────────────────────────────────────────────────

framework_rules_required_fields:
  - orderspec.artifact
  - orderspec.authority
  - orderspec.customization

framework_rules_field_constraints:
  orderspec.artifact:
    const: framework_rules
  orderspec.authority:
    const: framework
  orderspec.customization:
    const: forbidden

# ── protocol ──────────────────────────────────────────────────────────────────

protocol_required_fields:
  - orderspec.artifact

protocol_field_constraints:
  orderspec.artifact:
    const: protocol
